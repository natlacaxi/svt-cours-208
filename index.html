<p></>

<h1>Partie 1 : Être Vivants et Biodiversité</h1>

<p>Quelques caractéristiques possibles des êtres vivants :</p>

<ul>
<li>Reproduction</li>
<li>Evolution</li>
<li>Organisation cellulaire</li>
<li>Alimentation</li>
<li>Respiration</li>
<li>Développement</li>
<li>Interactions</li>
</ul>


<p><strong>Comment l'organisation des êtres vivants leurs permet-elle d'assurer leur fonctions vitales ?</strong></p>

<p><strong>Qu-est ce que la biodiversité ?</strong></p>

<p><strong>Quelles sont ces variations actuelles ou passées ?</strong></p>

<h2>Chapitre 1 : Les êtres vivants: Organisation et fonctionnement.</h2>

<h3>I) L'organisme pluricellulaire, un ensemble de cellules spécialisées.</h3>

<p><strong>L'organisme d'un être vivant pluricellulaire.</strong></p>

<p>Chez les organismes pluricellulaires, toutes les fonctions sont assurées par une seule cellule. Chez les organismes pluricellulaire les organes sont constitués de tissu assurant des fonctions particulières grâce à leur cellules spécialisées.</p>

<p>Les cellules sont dites spécialisées lorsqu'elles ont des caratères particuliers (forme, taille, caractéristiques du noyau, présence d'organite dans le cytoplasme) qui leur permettent de réaliser leur fonction.</p>

<p>Entre les cellules se trouve une matrice extra-cellulaire constituée de différentes molécules permettant l'adhérence cellulaire. Chez les végétaux cette matrice est appelée paroi cellulaire.</p>

<p><strong>L'origine de la spécialité des cellules.</strong></p>

<p>Toutes les cellules d'un organisme sont issues de la reproduction à l'identique, par divisions successives, d'une cellules unique, la cellules-oeuf. Elles possèdent donc toutes les mêmes gènes, et ainsi les mêmes informations génétiques. Cependant, les cellules spécialisées n'expriment qu'une partie de l'ADN : seules les informations de certains gènes sont “lues" pour mettre en place les caractéristiques particulières à leur spécialisation.</p>

<p>Scéma bilan </p>

<br>

<h3>II) Le métabolisme</h3>

<p><strong>Fonctionnement cellulaires et réactions chimiques</strong></p>

<p>De nombreuses transformation biochimique se déroulent à l'intérieur de la cellule, et permettent à celle-ci de se procurer l'energie de la matière nécessaires à son fonctionnement.</p>

<p>Par exemple, presque tous les cellules transforment le glucose grâce. à la réaction de respiration, pour obtenir l'énergie dont elle a besoin.</p>

<p>Respiration : O2 + glucose  &gt; énergie + CO2 + H2O</p>

<p>L'ensemble de ces réactions chimiques est appelée métabolisme.</p>

<p>Une voie métabolique est une succession de réactions biochimique transformant une molécule en autre.</p>

<p>Pour réaliser leur métabolisme, leur cellules (et donc les êtres vivants) échangent en permanence de la matière et de l'énergie avec leur environnement (millieu, autres cellules ou autres organismes…)</p>

<p><strong>Différents métabolismes</strong></p>

<p>Les différents cellules ont des métabolismes différents.</p>

<p>Par exemple, certains utilisent l'énergie de la lumière pour fabriquer leur matière organique, grâce à la réaction de photosynthèse. Elles sont dites autotrophes.</p>

<p>Photosynthèse: CO2 + H2O + lumière &gt; O2 + glucose ( &gt; autres molécules organiques)</p>

<p>D'autres fabriquent leur matière organique à partir de molécules organiques provenant d'autres êtres vivants, dont leur organisme se nourrit. Elles sont dites hétérotrophes.</p>

<p>Le métabolisme dépend de l'équipement spécialisé contenu par chaque cellule (organites, grosse molécules comme les enzymes ). Par exemple, mes chloroplates des cellules végétales vertes réalisent la photosynthèse.

<h2>Chapitre 2 : Biodiversité, résultats et étapes de l'évolution</h2>

<h3>I Les échelles d'observation de la biodiversité</h3>

<p>La notion d'espèces est un concept créé par l'être humain la définition de la notion d'espèce à vos principales critères le fait que les individus d'une même espèce peuvent se reproduire entre eux et engendre une descendance viable et fertile.</p>

<p>Etudier la biodiversité nécessite de reconnaître les espèces par des caractères spécifiques précis et de réaliser des comptages et mesures rigoureux.</p>

<h3>II. Explique la biodiversité</h3>

<p>Des individus sont identifiables comme appartenant à une espèce car ils en possèdent les caractères spécifiques deux individus d'une même espèce diffèrent par leur caractère individuels or tous les caractères sont déterminés par des gènes les biodiversités spécifiques et individuelles reposent donc sur des différences génétiques</p>

<p><strong>L'ADN, support de l'information génétique</strong></p>

<p>Toutes les caractéristiques des cellules sont déterminés par des informations génétiques contenus dans des portions de molécules d'ADN appelée gènes.</p>

<p>En effet la structure moléculaire de l’ADN (acide désoxyribo-nucléique) lui permet de porter l'information.</p>

<p>L'ADN est formé de deux chaînes de nucléotides appelés brin. Les nucléotides sont de quatres types: A, T, C et G selon la base azotée qui les composent.</p>

<p>Adénine</p>
<p>Thymine</p>
<p>Cytosine</p>
<p>Guanine</p>

<p>Les deux brins de la molécule d'ADN sont accolés par leur base azotée selon une complémentarité.</p>

<p>A d'un brin est toujours associé à T dans l'autre brin.</p>
<p>C d'un brin est toujours associé à G dans l'autre brin.</p>

<p>Le molécule d'ADN a ainsi une forme d'échelle dont les bases sont les barreaux. Cette échelle est torsadée: La molécule a une forme de double hélice</p>

<p>Les nucléotides sont les quatres lettre de l'alphabet du code  génétique. C'est la séquence (= succession ordonnéee = ordre + nombre) de ces nucléotides dans un brin qui code (= constitue) l'information génétique (IG). Ainsi, différents gènes (déterminants différents caractères par des informations différents) ont des séquences de nucléotides très différentes (environ 75% des nucléotides sont différents)</p>

<p><strong>Biodiversité individuelles et allèles</strong></p>

<p>Au sein de chaque espèce la diversité des individus repose sur la variabilité de l'ADN c'est la biodiversité génétique. En effet, les différents aspects d'un même caractère visible chez les différents individus d'une espèce, s'explique par l'existence pour cette espèce de différente allèles du gène dirigeant la mise en place de ce caractère. Les différentes allèles d'un gène ont des séquences nucléotidiques très peu différentes (généralement moins de 10% des nucléotides sont différents)</p>

<p>Si chaque individu ne peut posséder que deux allèles (identiques ou différents) pour un gène donné l'espèce peut opposer d'un grand nombre.</p>

<p>Ces différents allèles d'un même gène sont issus de mutation successives qui se sont produits au cours des générations.</p>

<p>Illustration de la notion gène/allèles avec l'exemple de l'Hémoglobine B.</p>

<p>Schéma Bilan A et B (du grand II)</p>

<p><strong>La diversité des espèces et écosystèmes, résultat de mécanismes successif</strong></p>

<p>L'étude de la biodiversité du passé par l'examen des fossiles, montre que la biodiversité des espèces, et donc des écosystèmes évoluent en permanence, et que l'état actuel de la biodiversité correspond à une étape de l'histoire du vivant. Ainsi les organismes vivants actuels, ne représentent qu'une petite partie des organismes ayant existé depuis le début de la vie en effet de nombreuses espèces sont apparues et/ou ont disparu au cours des temps géologiques, modifiant les écosystèmes.</p>

<p>L'évolution de la biodiversité des espèces et observables, comme celles de la diversité génétique, sur de courtes échelles de temps (quelques générations.)

<p><strong>La spéciation (apparition d'une nouvelle espèce)</strong></p>

<p>Une nouvelle espèce se forme à partir d'une population (groupe d'individus d'une même espèce qui vivent préférentiellement entre eux) qui acquiert des nouveaux état de caractère la rendant incapable de se reproduire avec sa population d'origine.</p>

<p>Ces nouveaux états de caractère peuvent résulter d'une mutation particulière ou (plus souvent) de l'accumulation de différences génétiques par rapport à la population d'origine.</p>

<p>Ceci se produit lorsque la population se retrouve isolés géographiquement pendant plusieurs générations, et peut résulter de différents mécanismes évolutifs.</p>

<p>Schéma reprenant les principales étapes de la spéciation.</p>

<p><strong>Les mécanismes évolutifs</strong></p>

<p>Tous les individus d'une espèce ne possèdent pas les mêmes allèles pour un gène donné ces allèles sont donc présents dans une espèce avec des fréquences différentes appelées fréquences allélique.</p>

<p>Plusieurs mécanismes évolutifs peuvent modifier les fréquences alléliques au sein d'une population isolée et la ronde génétiquement différentes des autres populations de son espèce</p>

<p><strong>La dérive génétique</strong></p>

<p>Petit rappel de situation :</p>

<p>On est dans le petit a) du 2. (les mécanismes évolutif) du grand C.(La biodiversité) du grand II (expliquer la diversité) du chap. 2.</p>

<p>Chaque parent ne transmet à ses enfants que la moitié de ses allèles. De plus, certains enfants n'auront pas de descendants. Ainsi le hasard de la reproduction fait disparaitre certains allèles au fil des générations, tandis que d'autres allèles voient par conséquent leur fréquence augmenté.</p>

<p>Cette modification aléatoire des fréquences au sein d'une population, au cours des générations successives est appeler la dérive génétique.</p>

<p>Elle se produit de façon plus rapide lorsque l'effectif de la population est faible (exemple : si un petit groupe d'individus migrent et s'isole géographiquement)</p>

<p><strong>La sélection naturelle</strong></p>

<p>Les allèles qui favorisent la survie ou la reproduction des individus dans un milieu donné (conditions climatique, concurrence entre espèces pour des ressources limitées, prédateurs…) voient leurs fréquences augmentées dans les populations, tandis que ceux qui ont sont défavorables voient leurs fréquences diminuée : c'est la sélection naturelle.</p>

<p>Les activités humaines qui constituent un “environnement” particulier, exercent aussi une sélection sur les individus et modifier les fréquences alléliques (exemple : éléphants, exemple ci-dessous de la phalène du bouleau en Grande-Bretagne)</p>

<p>Exemple de l'évolution de la population de Phalène du bouleau en Grande-Bretagne depuis 1860.</p>

<p><strong>3. Le rôle majeur de la communication animale</strong></p>

<p><strong>Rôle de la communication dans la reproduction</strong></p>

<p>La communication interindividuelle (entre deux individus) dans le monde vivant consiste en la transmission d'un message entre un organisme émetteur et un organisme récepteur, qui pourrait modifier son comportement en réponse à ce message.</p>

<p>S'il existe une grande diversité de modalités de communication (chimique, biochimique, sonore, hormonale, visuel) elle paraît toujours la réalisation d'une fonction biologique (nutrition, défense, reproduction, etc…)</p>

<p>La communication est fondamentale pour la reproduction. En, chez les espèces qui mènent une vie solitaire, la communication permet de trouver un partenaire sexuel. Chez celles qui vivent en société, elle permet la sélection des reproducteurs.</p>

<p><strong>La sélection sexuel: communication et sélection naturelle</strong></p>

<p>Dans le monde animal, la communication du les comportement qui en découlent peuvent contribuer à la sélection naturelle, à travers la reproduction. On parle alors de sélection sexuelle entre partenaires (majoritairement faire part les femelles). Ainsi en choisissant pour partenaires les mâles qui leur ont communiqué la démonstration de leur supériorité, les femelles garantissent la transmission d'allèles avantageux à leur descendance.</p>

<p><strong>Altération de la communication et spéciation</strong></p>

<p>Par ailleurs, des variations vous difficultés dans l'émission ou la réception du signal peuvent générer sous le long terme un isolement reproducteurs entre organisme de la même espèce et être à l'origine d'un événement de spéciation.</p>

<p><strong>D)  Les crises biologiques: des modifications brutale de la biosphère</strong></p>

<p>L'histoire de la Terre a été le théâtre de 5 grandes crises biologiques, caractérisées par une modification importante et relativement importante que la biodiversité avec des extinctions massives (disparition d'un grand nombre d'espèces et de groupes d'espèces entiers, dans tous les milieux de vie) suivie de diversification (certains groupes voient le nombre de leur espèce augmenter rapidement après la crise).</p>

<p>Causée par des bouleversements de l'environnement, les crises biologiques sont donc une accélération à grande échelle de la sélection naturelle puisqu'elle sélectionne et diversifie les êtres vivants les mieux adaptés aux nouvelles conditions du milieu.</p>

<h3>Conclusion</h3>

<p>La biodiversité évolue en permanence sous l'effet de nombreux facteurs, comme</p>

<ul>
<li>les mutations (qui font apparaître de nouveaux individus porteurs de nombreux nouveaux allèles)</li>
<li>le hasard (qui induit la dérivée génétique)</li>
<li>les variations des conditions environnementales (qui introduisent la sélection naturelle)</li>
<li>l'activité humaine.</li>
</ul>

<p>Les crises biologiques dont les causes ont pu être multiples, sont des bouleversements importants et rapides à l'échelle de la planète de la biodiversité</p>

<p>Aujourd'hui les activités humaines sont la cause d'une 6e crise biologique.</p>

// ── Horloge ────────────────────────────────────────────────
function getSem(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - y) / 86400000) + 1) / 7);
}

function tick() {
  const d = new Date();
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const mois  = ['janvier','février','mars','avril','mai','juin','juillet','août',
                  'septembre','octobre','novembre','décembre'];
  document.getElementById('jour').textContent = jours[d.getDay()];
  document.getElementById('date-complet').textContent =
    d.getDate() + ' ' + mois[d.getMonth()] + ' ' + d.getFullYear();
  const n = getSem(d);
  const s = n % 2 === 1 ? 'A' : 'B';
  const b = document.getElementById('sem-b');
  document.getElementById('sem-n').textContent = 'n°' + n;
  b.textContent = s;
  b.style.background = s === 'A' ? 'rgba(79,142,247,.2)' : 'rgba(62,207,142,.2)';
  b.style.color       = s === 'A' ? '#4f8ef7'             : '#3ecf8e';
}

// ── Rendu liste ────────────────────────────────────────────
function render() {
  const c = document.getElementById('seq-list');
  c.innerHTML = '';
  SEQUENCES.forEach((seq, si) => {
    seq.parties.forEach((p, pi) => {
      const div = document.createElement('div');
      div.className = 'seq-card';
      div.innerHTML = `
        <div class="seq-num">${si+1}.${pi+1}</div>
        <div class="seq-info">
          <div class="seq-titre">${p.titre}</div>
          <div class="seq-sous">${seq.titre}</div>
        </div>
        <div class="seq-arrow">→</div>`;
      div.onclick = () => ouvrir(si, pi);
      c.appendChild(div);
    });
  });
  c.classList.remove('stagger');
  void c.offsetWidth;
  c.classList.add('stagger');
}

function ouvrir(si, pi) {
  const seq = SEQUENCES[si], p = seq.parties[pi];
  document.getElementById('cours-titre').textContent = p.titre;
  document.getElementById('cours-meta').textContent  = '🌿 SVT · ' + seq.titre;
  document.getElementById('cours-contenu').innerHTML = p.contenu;
  document.getElementById('page-liste').classList.remove('active');
  document.getElementById('page-cours').classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function retour() {
  document.getElementById('page-cours').classList.remove('active');
  document.getElementById('page-liste').classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

document.addEventListener('DOMContentLoaded', () => {
  tick();
  setInterval(tick, 10000);
  render();
});
